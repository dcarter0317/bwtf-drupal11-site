name: Deploy to NameHero Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MACBOOK_NAMEHERO }}

      - name: Add NameHero host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.NAMEHERO_PORT }} ${{ secrets.NAMEHERO_HOST }} >> ~/.ssh/known_hosts

      - name: Create lightweight deploy archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude=.git \
            --exclude=.github \
            --exclude=.ddev \
            --exclude=vendor \
            --exclude=node_modules \
            --exclude=web/core \
            --exclude=web/modules/contrib \
            --exclude=web/themes/contrib \
            --exclude=web/profiles/contrib \
            --exclude=web/sites/default/files \
            --exclude=web/sites/default/settings.php \
            --exclude=web/sites/default/services.yml \
            --exclude='*.sql' \
            --exclude='*.sql.gz' \
            --exclude='*.tar' \
            --exclude='*.tar.gz' \
            --exclude='*.zip' \
            .

      - name: Upload archive
        run: |
          scp -P ${{ secrets.NAMEHERO_PORT }} /tmp/deploy.tar.gz \
            ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }}:/home/bwtfcom/stage.bwtf.com/deploy.tar.gz

      - name: Extract, install Composer dependencies, and run Drupal commands
        run: |
          ssh -p ${{ secrets.NAMEHERO_PORT }} ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            set -ex

            whoami
            pwd
            ls -la /home/bwtfcom/stage.bwtf.com/deploy.tar.gz || echo "deploy.tar.gz check failed"

            cd /home/bwtfcom/stage.bwtf.com

            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz

            /opt/alt/php83/usr/bin/php composer.phar install --no-dev --optimize-autoloader --no-interaction

            vendor/bin/drush updb -y
            vendor/bin/drush cr
            vendor/bin/drush state:set system.maintenance_mode 0 --input-format=integer
            vendor/bin/drush cr
          '
