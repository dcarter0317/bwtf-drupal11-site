name: Deploy to NameHero Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.IDEAPAD_ACTIONS_FOR_DEPLOYMENT }}

      - name: Add NameHero host to known_hosts
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p 37980 ${{ secrets.NAMEHERO_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} "whoami && hostname && pwd"

      - name: Ensure remote deploy path exists
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            mkdir -p /home/bwtfcom/stage.bwtf.com &&
            ls -ld /home/bwtfcom/stage.bwtf.com
          '

      - name: Create deploy archive
        run: |
          set -euxo pipefail
          tar -czf deploy.tar.gz \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=web/sites/default/files \
            --exclude=web/sites/default/settings.php \
            .
          ls -lh deploy.tar.gz

      - name: Upload archive to server
        run: |
          set -euxo pipefail
          scp -P 37980 deploy.tar.gz \
            ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }}:/home/bwtfcom/stage.bwtf.com/

      - name: Verify archive on server
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            ls -lh /home/bwtfcom/stage.bwtf.com/deploy.tar.gz
          '

      - name: Extract archive on server
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            cd /home/bwtfcom/stage.bwtf.com &&
            tar -xzf deploy.tar.gz &&
            rm -f deploy.tar.gz &&
            ls -la
          '

      - name: Ensure Drupal files directory exists
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            mkdir -p /home/bwtfcom/stage.bwtf.com/web/sites/default/files &&
            ls -ld /home/bwtfcom/stage.bwtf.com/web/sites/default/files
          '

      - name: Verify Drush exists
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            ls -l /home/bwtfcom/stage.bwtf.com/vendor/bin/drush
          '

      - name: Clear Drupal cache
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            cd /home/bwtfcom/stage.bwtf.com/web &&
            ../vendor/bin/drush cr
          '