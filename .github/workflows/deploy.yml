name: Deploy to NameHero Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, gd, zip
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MACBOOK_NAMEHERO }}

      - name: Add NameHero host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create deploy archive
        run: |
          tar -czf /tmp/deploy.tar.gz \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=web/sites/default/files \
            --exclude=web/sites/default/settings.php \
            --exclude=web/sites/default/services.yml \
            --exclude='*.sql' \
            --exclude='*.sql.gz' \
            --exclude='*.tar' \
            --exclude='*.tar.gz' \
            --exclude='*.zip' \
            .

      - name: Upload archive
        run: |
          scp -P ${{ secrets.SSH_PORT }} /tmp/deploy.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/bwtfcom/stage.bwtf.com/deploy.tar.gz

      - name: Extract and run Drupal commands
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            cd /home/bwtfcom/stage.bwtf.com

            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz

            vendor/bin/drush updb -y
            vendor/bin/drush cr
            vendor/bin/drush state:set system.maintenance_mode 0 --input-format=integer
            vendor/bin/drush cr
          '
