name: Deploy to NameHero Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.IDEAPAD_ACTIONS_FOR_DEPLOYMENT }}

      - name: Add NameHero host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 37980 ${{ secrets.NAMEHERO_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} "echo SSH connected"

      - name: Ensure remote deploy path exists
        run: |
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            mkdir -p /home/bwtfcom/stage.bwtf.com
          '

      - name: Debug remote tools
        run: |
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            whoami
            pwd
            which rsync || echo "rsync not found"
            rsync --version || true
            df -h
            ls -la /home/bwtfcom/stage.bwtf.com || true
          '
      - name: Upload code to server
        run: |
          rsync -avz \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude="web/sites/default/files" \
            --exclude="web/sites/default/settings.php" \
            -e "ssh -p 37980" \
            ./ ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }}:/home/bwtfcom/stage.bwtf.com/
           
      - name: Fix permissions for files directory
        run: |
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            mkdir -p /home/bwtfcom/stage.bwtf.com/web/sites/default/files
          '

      - name: Clear Drupal cache
        run: |
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            cd /home/bwtfcom/stage.bwtf.com/web &&
            ../vendor/bin/drush cr || true
          '