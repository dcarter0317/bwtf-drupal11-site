name: Deploy to NameHero Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, gd, zip
          tools: composer:v2

      - name: Install Composer dependencies
        shell: bash
        run: |
          set -euxo pipefail
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.IDEAPAD_ACTIONS_FOR_DEPLOYMENT }}

      - name: Add NameHero host to known_hosts
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p 37980 ${{ secrets.NAMEHERO_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} "whoami && hostname && pwd"

      - name: Ensure remote deploy path exists
        shell: bash
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            mkdir -p /home/bwtfcom/stage.bwtf.com/web/sites/default/files
          '

      - name: Create deploy archive
        shell: bash
        run: |
          set -euxo pipefail
          tar -czf /tmp/deploy.tar.gz \
          --exclude=.git \
          --exclude=.github \
          --exclude=node_modules \
          --exclude=web/sites/default/files \
          --exclude=web/sites/default/settings.php \
          --exclude=web/sites/default/default.settings.php \
          --exclude=web/sites/default/default.services.yml \
          .
          ls -lh /tmp/deploy.tar.gz

      - name: Upload archive to server
        shell: bash
        run: |
          set -euxo pipefail
          scp -P 37980 /tmp/deploy.tar.gz \
            ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }}:/home/bwtfcom/stage.bwtf.com/deploy.tar.gz

      - name: Clean old code but preserve settings and files
        shell: bash
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            cd /home/bwtfcom/stage.bwtf.com

            find . -mindepth 1 -maxdepth 1 \
              ! -name web \
              ! -name deploy.tar.gz \
              -exec rm -rf {} +

            find web -mindepth 1 -maxdepth 1 \
              ! -name sites \
              -exec rm -rf {} +

            find web/sites -mindepth 1 -maxdepth 1 \
              ! -name default \
              -exec rm -rf {} +

            find web/sites/default -mindepth 1 -maxdepth 1 \
                ! -name settings.php \
                ! -name files \
                ! -name default.settings.php \
                ! -name default.services.yml \
                -exec rm -rf {} +
          '
      - name: Extract archive on server
        shell: bash
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            cd /home/bwtfcom/stage.bwtf.com &&
            tar -xzf deploy.tar.gz &&
            rm -f deploy.tar.gz
          '

      - name: Ensure Drupal files directory exists
        shell: bash
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            mkdir -p /home/bwtfcom/stage.bwtf.com/web/sites/default/files
          '

      - name: Clear Drupal cache
        shell: bash
        run: |
          set -euxo pipefail
          ssh -p 37980 ${{ secrets.NAMEHERO_USER }}@${{ secrets.NAMEHERO_HOST }} '
            cd /home/bwtfcom/stage.bwtf.com/web &&
            ../vendor/bin/drush cr || true
          '
      - name: Post-deploy PHP 8.3 & Drush fix
        shell: bash
        run: ssh ${{ secrets.STAGE_SSH_USER }}@${{ secrets.STAGE_HOST }} 'bash /home/bwtfcom/stage.bwtf.com/post_deploy_fix.sh'    